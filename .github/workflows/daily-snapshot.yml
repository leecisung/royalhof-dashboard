name: Daily Snapshot

# 매일 06:00 KST (= 전일 21:00 UTC) 실행. 수동 실행도 가능.
on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv facebook-business google-analytics-data google-auth google-auth-oauthlib

      - name: Write .env and GA4 token from secrets
        run: |
          cat > .env <<EOF
          NAVER_AD_API_KEY=${{ secrets.NAVER_AD_API_KEY }}
          NAVER_AD_SECRET_KEY=${{ secrets.NAVER_AD_SECRET_KEY }}
          NAVER_AD_CUSTOMER_ID=${{ secrets.NAVER_AD_CUSTOMER_ID }}
          BURGEORI_NEW_API_KEY=${{ secrets.BURGEORI_NEW_API_KEY }}
          BURGEORI_NEW_SECRET_KEY=${{ secrets.BURGEORI_NEW_SECRET_KEY }}
          BURGEORI_NEW_CUSTOMER_ID=${{ secrets.BURGEORI_NEW_CUSTOMER_ID }}
          BURGEORI_OLD_API_KEY=${{ secrets.BURGEORI_OLD_API_KEY }}
          BURGEORI_OLD_SECRET_KEY=${{ secrets.BURGEORI_OLD_SECRET_KEY }}
          BURGEORI_OLD_CUSTOMER_ID=${{ secrets.BURGEORI_OLD_CUSTOMER_ID }}
          META_APP_ID=${{ secrets.META_APP_ID }}
          META_APP_SECRET=${{ secrets.META_APP_SECRET }}
          META_ACCESS_TOKEN=${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID=${{ secrets.META_AD_ACCOUNT_ID }}
          META_PIXEL_ID=${{ secrets.META_PIXEL_ID }}
          META_PIXEL_EVENT=${{ secrets.META_PIXEL_EVENT }}
          GA4_PROPERTY_ID=${{ secrets.GA4_PROPERTY_ID }}
          EOF
          # GA4 OAuth user token (JSON 통째)
          echo '${{ secrets.GA4_USER_TOKEN_JSON }}' > .ga4-user-token.json

      - name: Run snapshot
        run: python scripts/prefetch_snapshot.py

      - name: Sync to api/snapshots/ (Vercel bundle)
        run: |
          mkdir -p api/snapshots
          cp data/snapshots/latest.json api/snapshots/latest.json

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshots/latest.json api/snapshots/latest.json
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "snapshot: $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Clean up secrets
        if: always()
        run: |
          rm -f .env .ga4-user-token.json
