{% extends "base.html" %}
{% block title %}로그인 — 광고 통합 대시보드{% endblock %}
{% set hide_header = True %}
{% block content %}
<main style="display:flex;align-items:center;justify-content:center;min-height:80vh">
  <form method="post" action="/login" class="card" style="width:340px">
    <h2>🔐 광고 대시보드</h2>
    <p style="font-size:12px;color:var(--muted);margin:0 0 14px">
      비밀번호를 입력하세요
    </p>
    <input type="password" name="password" autofocus required
           style="width:100%;padding:9px 12px;border:1px solid var(--line);border-radius:4px;font-size:14px;margin-bottom:10px">
    {% if error %}
      <p style="color:var(--neg);font-size:12px;margin:0 0 10px">❌ 비밀번호가 일치하지 않습니다</p>
    {% endif %}
    <button type="submit"
            style="width:100%;padding:9px;background:var(--accent);color:#fff;border:none;border-radius:4px;font-size:14px;cursor:pointer">
      로그인
    </button>
  </form>
</main>
{% endblock %}
