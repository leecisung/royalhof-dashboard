<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}광고 통합 대시보드{% endblock %}</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --line: #e5e7eb;
    --ink: #111827;
    --muted: #6b7280;
    --accent: #1f2937;
    --neg: #dc2626;
    --pos: #2563eb;
    --warn: #d97706;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo",
                 "Malgun Gothic", sans-serif;
    font-size: 14px;
  }
  header {
    background: var(--accent); color: #fff;
    padding: 14px 24px;
    display: flex; align-items: center; gap: 20px;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header nav { flex: 1; }
  header nav a {
    color: #d1d5db; text-decoration: none; margin-right: 16px; font-size: 13px;
  }
  header nav a:hover { color: #fff; }
  header nav a.active { color: #fff; border-bottom: 2px solid #fff; padding-bottom: 2px; }
  header .links { display: flex; align-items: center; gap: 14px; }
  header .links a { color: #9ca3af; font-size: 12px; text-decoration: none; }
  header .links a:hover { color: #fff; }
  header .ext { padding: 4px 10px; border: 1px solid #4b5563; border-radius: 4px; }
  header .ext:hover { background: #374151; color: #fff; border-color: #6b7280; }
  header .logout { color: #9ca3af; font-size: 12px; text-decoration: none; }
  header .logout:hover { color: #fff; }
  /* 액션 버튼 */
  .btn-action {
    display: inline-block; padding: 3px 8px; border-radius: 3px;
    font-size: 11px; font-weight: 500; cursor: pointer;
    border: 1px solid var(--line); background: #fff; color: var(--ink);
    margin-right: 4px;
  }
  .btn-action:hover { background: #f3f4f6; }
  .btn-action.danger { color: var(--neg); border-color: #fecaca; }
  .btn-action.danger:hover { background: #fef2f2; }
  /* 분류 배지 */
  .badge { display: inline-block; padding: 2px 7px; border-radius: 3px; font-size: 11px; font-weight: 500; }
  .badge.winner { background: #dcfce7; color: #166534; }
  .badge.declining { background: #fef3c7; color: #92400e; }
  .badge.learning { background: #dbeafe; color: #1e40af; }
  .badge.kill { background: #fee2e2; color: #991b1b; }
  .badge.hold { background: #f3f4f6; color: #374151; }
  .badge.increase { background: #dcfce7; color: #166534; }
  .badge.decrease { background: #fef3c7; color: #92400e; }
  .badge.pause { background: #fee2e2; color: #991b1b; }
  /* 인사이트 카드 */
  .insights-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .insight-block { padding: 10px 12px; border-radius: 6px; font-size: 13px; }
  .insight-block.win { background: #ecfdf5; border: 1px solid #bbf7d0; }
  .insight-block.fix { background: #fffbeb; border: 1px solid #fde68a; }
  .insight-block.warn { background: #fef2f2; border: 1px solid #fecaca; }
  .insight-block h3 { margin: 0 0 6px; font-size: 12px; }
  .insight-block ul { margin: 0; padding-left: 14px; }
  .insight-block li { margin: 3px 0; }
  @media (max-width: 900px) { .insights-grid { grid-template-columns: 1fr; } }

  main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 8px; padding: 16px 18px;
    margin-bottom: 18px;
  }
  .card h2 {
    font-size: 14px; margin: 0 0 12px 0;
    padding-bottom: 8px; border-bottom: 2px solid var(--ink);
    display: flex; align-items: center; gap: 8px;
  }
  .card h2 .meta {
    margin-left: auto; font-size: 12px; color: var(--muted); font-weight: 400;
  }

  table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  table th, table td {
    border-bottom: 1px solid var(--line);
    padding: 8px 10px; text-align: right;
    white-space: nowrap;
  }
  table th {
    background: #f9fafb; font-weight: 600;
    text-align: center; color: #374151;
    border-bottom: 2px solid var(--line);
  }
  table td.left, table th.left { text-align: left; }
  table tbody tr:hover { background: #fafbfc; }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .kpi {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 14px;
  }
  .kpi .label {
    font-size: 11px; color: var(--muted); margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .kpi .value {
    font-size: 22px; font-weight: 600; color: var(--ink);
  }
  .kpi .sub {
    font-size: 11px; color: var(--muted); margin-top: 2px;
  }

  .controls {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: end;
    margin-bottom: 16px;
  }
  .controls label {
    display: flex; flex-direction: column; gap: 3px;
    font-size: 12px; color: var(--muted);
  }
  .controls select, .controls input {
    padding: 6px 10px; border: 1px solid var(--line); border-radius: 4px;
    background: #fff; font-size: 13px; color: var(--ink);
  }
  .controls button {
    padding: 7px 14px; border: 1px solid var(--accent);
    background: var(--accent); color: #fff;
    border-radius: 4px; font-size: 13px; cursor: pointer;
  }
  .controls button.outline {
    background: #fff; color: var(--accent);
  }
  .controls button:hover { opacity: 0.85; }

  .pill {
    display: inline-block;
    padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 500;
  }
  .pill.naver { background: #dcfce7; color: #166534; }
  .pill.meta { background: #dbeafe; color: #1e40af; }
  .pill.cache { background: #fef3c7; color: #92400e; }
  .pill.fresh { background: #dbeafe; color: #1e40af; }

  footer {
    text-align: center; padding: 20px;
    color: var(--muted); font-size: 12px;
  }
</style>
</head>
<body>
{% block body %}
{% if not hide_header %}
<header>
  <h1>📊 광고 통합 대시보드</h1>
  <nav>
    <a href="/" class="{% if active=='home' %}active{% endif %}">종합</a>
    <a href="/daily" class="{% if active=='daily' %}active{% endif %}">📅 일일 분석</a>
    <a href="/meta" class="{% if active=='meta' %}active{% endif %}">Meta 상세</a>
    <a href="/naver" class="{% if active=='naver' %}active{% endif %}">Naver 상세</a>
  </nav>
  <div class="links">
    <a href="https://bsfnb-dashboard.vercel.app/" target="_blank" rel="noopener" class="ext">↗ bsfnb 매출</a>
    {% if has_password %}
      <a href="/logout" class="logout">로그아웃</a>
    {% endif %}
  </div>
</header>
{% endif %}
{% block content %}{% endblock %}
{% endblock %}
<script>
  // 날짜 input을 손으로 바꾸면 preset이 자동으로 'custom'으로 전환
  document.querySelectorAll('.controls input[type=date]').forEach(function(inp) {
    inp.addEventListener('change', function() {
      var form = inp.closest('form');
      if (!form) return;
      var sel = form.querySelector('select[name=preset]');
      if (!sel) return;
      var hasCustom = Array.prototype.some.call(sel.options, function(o){ return o.value === 'custom'; });
      if (hasCustom) sel.value = 'custom';
    });
  });
</script>
</body>
</html>
