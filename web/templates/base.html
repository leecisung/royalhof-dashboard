<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{% block title %}광고 통합 대시보드{% endblock %}</title>
<style>
  :root {
    --bg: #f5f6f8;
    --card: #ffffff;
    --line: #e5e7eb;
    --ink: #111827;
    --muted: #6b7280;
    --accent: #1f2937;
    --neg: #dc2626;
    --pos: #2563eb;
    --warn: #d97706;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--ink);
    font-family: -apple-system, BlinkMacSystemFont, "Pretendard", "Apple SD Gothic Neo",
                 "Malgun Gothic", sans-serif;
    font-size: 14px;
  }
  header {
    background: var(--accent); color: #fff;
    padding: 14px 24px;
    display: flex; align-items: center; gap: 20px;
  }
  header h1 { font-size: 16px; margin: 0; font-weight: 600; }
  header nav { flex: 1; }
  header nav a {
    color: #d1d5db; text-decoration: none; margin-right: 16px; font-size: 13px;
  }
  header nav a:hover { color: #fff; }
  header .logout { color: #9ca3af; font-size: 12px; text-decoration: none; }
  header .logout:hover { color: #fff; }

  main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }

  .card {
    background: var(--card); border: 1px solid var(--line);
    border-radius: 8px; padding: 16px 18px;
    margin-bottom: 18px;
  }
  .card h2 {
    font-size: 14px; margin: 0 0 12px 0;
    padding-bottom: 8px; border-bottom: 2px solid var(--ink);
    display: flex; align-items: center; gap: 8px;
  }
  .card h2 .meta {
    margin-left: auto; font-size: 12px; color: var(--muted); font-weight: 400;
  }

  table {
    width: 100%; border-collapse: collapse; font-size: 13px;
  }
  table th, table td {
    border-bottom: 1px solid var(--line);
    padding: 8px 10px; text-align: right;
    white-space: nowrap;
  }
  table th {
    background: #f9fafb; font-weight: 600;
    text-align: center; color: #374151;
    border-bottom: 2px solid var(--line);
  }
  table td.left, table th.left { text-align: left; }
  table tbody tr:hover { background: #fafbfc; }

  .kpi-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 10px;
  }
  .kpi {
    background: #fff;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 12px 14px;
  }
  .kpi .label {
    font-size: 11px; color: var(--muted); margin-bottom: 4px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .kpi .value {
    font-size: 22px; font-weight: 600; color: var(--ink);
  }
  .kpi .sub {
    font-size: 11px; color: var(--muted); margin-top: 2px;
  }

  .controls {
    display: flex; flex-wrap: wrap; gap: 8px; align-items: end;
    margin-bottom: 16px;
  }
  .controls label {
    display: flex; flex-direction: column; gap: 3px;
    font-size: 12px; color: var(--muted);
  }
  .controls select, .controls input {
    padding: 6px 10px; border: 1px solid var(--line); border-radius: 4px;
    background: #fff; font-size: 13px; color: var(--ink);
  }
  .controls button {
    padding: 7px 14px; border: 1px solid var(--accent);
    background: var(--accent); color: #fff;
    border-radius: 4px; font-size: 13px; cursor: pointer;
  }
  .controls button.outline {
    background: #fff; color: var(--accent);
  }
  .controls button:hover { opacity: 0.85; }

  .pill {
    display: inline-block;
    padding: 2px 8px; border-radius: 10px;
    font-size: 11px; font-weight: 500;
  }
  .pill.naver { background: #dcfce7; color: #166534; }
  .pill.meta { background: #dbeafe; color: #1e40af; }
  .pill.cache { background: #fef3c7; color: #92400e; }
  .pill.fresh { background: #dbeafe; color: #1e40af; }

  footer {
    text-align: center; padding: 20px;
    color: var(--muted); font-size: 12px;
  }
</style>
</head>
<body>
{% block body %}{% endblock %}
</body>
</html>
